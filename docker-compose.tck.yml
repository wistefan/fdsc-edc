#
# Docker Compose for DSP TCK Conformance Testing
#
# Orchestrates the fdsc-edc controlplane and the Eclipse DSP TCK runner.
# Usage:
#   docker compose -f docker-compose.tck.yml up --build --abort-on-container-exit --exit-code-from tck
#
# To override the TCK image version:
#   DSP_TCK_VERSION=0.9.0 docker compose -f docker-compose.tck.yml up --build --abort-on-container-exit --exit-code-from tck
#
# Prerequisites:
#   - Build the controlplane shaded JAR first:
#     mvn clean package -pl controlplane-oid4vc -am -DskipTests
#
# See also: scripts/run-tck.sh for a one-command local workflow.
#

services:
  # -------------------------------------------------------------------------
  # HashiCorp Vault (dev mode) — required by the vault-hashicorp EDC extension
  # -------------------------------------------------------------------------
  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: root-token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    healthcheck:
      test: ["CMD", "vault", "status"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - tck-net

  # -------------------------------------------------------------------------
  # EDC Controlplane (OID4VC variant) configured for TCK mode
  # -------------------------------------------------------------------------
  edc:
    image: fdsc-edc-controlplane-oid4vc:${EDC_IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        JAR: controlplane-oid4vc/target/controlplane-oid4vc-0.0.1-SNAPSHOT.jar
    environment:
      EDC_FS_CONFIG: /app/config/edc.properties
    volumes:
      - ./config/tck/edc.properties:/app/config/edc.properties:ro
    ports:
      - "8080:8080"   # Default API
      - "8181:8181"   # Management API
      - "8282:8282"   # DSP Protocol
      - "8687:8687"   # TCK Webhook
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/api/check/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s
    depends_on:
      vault:
        condition: service_healthy
    networks:
      - tck-net

  # -------------------------------------------------------------------------
  # Eclipse DSP TCK Runner
  # -------------------------------------------------------------------------
  tck:
    image: eclipsedataspacetck/dsp-tck-runtime:${DSP_TCK_VERSION:-1.0.0-RC6}
    volumes:
      - ./config/tck/tck.properties:/etc/tck/config.properties:ro
    depends_on:
      edc:
        condition: service_healthy
    networks:
      - tck-net

networks:
  tck-net:
    driver: bridge

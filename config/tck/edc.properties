#
# EDC Controlplane Configuration for TCK Mode
#
# This properties file configures the Eclipse Dataspace Connector controlplane
# to run in TCK (Technology Compatibility Kit) mode. It enables the test
# extensions, configures the required API ports, and sets up identity services
# for DSP conformance testing.
#
# Usage: Pass this file to the EDC runtime via the EDC_FS_CONFIG environment
# variable or the -Dedc.fs.config JVM argument.
#

# ---------------------------------------------------------------------------
# Participant Identity
# ---------------------------------------------------------------------------

# The connector's participant ID — must match dataspacetck.dsp.connector.agent.id
# in tck.properties
edc.participant.id=urn:connector:fdsc-edc

# Hostname of the connector (Docker Compose service name)
edc.hostname=edc

# ---------------------------------------------------------------------------
# Default API Context
# ---------------------------------------------------------------------------

# Default web API port and path
web.http.port=8080
web.http.path=/api

# ---------------------------------------------------------------------------
# Management API Context
# ---------------------------------------------------------------------------

# Management API for administrative operations
web.http.management.port=8181
web.http.management.path=/management

# ---------------------------------------------------------------------------
# DSP Protocol API Context
# ---------------------------------------------------------------------------

# DSP protocol endpoint — must match the URL in tck.properties
web.http.protocol.port=8282
web.http.protocol.path=/protocol

# ---------------------------------------------------------------------------
# TCK Webhook API Context
# ---------------------------------------------------------------------------

# TCK webhook controller for consumer-side test initiation
# Must match the URLs in tck.properties:
#   dataspacetck.dsp.connector.negotiation.initiate.url
#   dataspacetck.dsp.connector.transfer.initiate.url
web.http.tck.port=8687
web.http.tck.path=/tck

# ---------------------------------------------------------------------------
# DSP Callback Address
# ---------------------------------------------------------------------------

# The address the connector advertises for DSP protocol callbacks
# Points to this connector's protocol endpoint
edc.dsp.callback.address=http://edc:8282/protocol

# ---------------------------------------------------------------------------
# Test Extension Settings
# ---------------------------------------------------------------------------

# Master switch to enable TCK test support (guards, step recorders)
testExtension.enabled=true

# Enable the TCK webhook controller that exposes endpoints for the TCK
# to trigger consumer-side contract negotiations and transfer processes
testExtension.controller.enabled=true
testExtension.controller.port=8687
testExtension.controller.path=/tck

# Enable the test identity service (mock IdentityService, AudienceResolver,
# ParticipantIdExtractionFunction, and in-memory Vault) so the controlplane
# can operate without real credential/identity/vault infrastructure
testExtension.identity.enabled=true

# ---------------------------------------------------------------------------
# TMForum Extension Configuration
# ---------------------------------------------------------------------------

# Enable the TMForum storage backend. A connected TMForum instance
# (FIWARE tmforum-api all-in-one) is populated with test data by the
# init-tmforum.sh script before the EDC controlplane starts.
tmfExtension.enabled=true
tmfExtension.catalog.enabled=true

# TMForum API endpoints (Docker Compose service name: tmforum, port: 8632)
tmfExtension.quoteApi=http://tmforum:8632/tmf-api/quote/v4
tmfExtension.agreementApi=http://tmforum:8632/tmf-api/agreementManagement/v4
tmfExtension.productOrderApi=http://tmforum:8632/tmf-api/productOrderingManagement/v4
tmfExtension.productCatalogApi=http://tmforum:8632/tmf-api/productCatalogManagement/v4
tmfExtension.productInventoryApi=http://tmforum:8632/tmf-api/productInventory/v4
tmfExtension.usageManagementApi=http://tmforum:8632/tmf-api/usageManagement/v4
tmfExtension.partyCatalogApi=http://tmforum:8632/tmf-api/party/v4

# ---------------------------------------------------------------------------
# Transfer Process Configuration
# ---------------------------------------------------------------------------

# Disable the FDSC transfer extension for TCK mode (not needed for DSP
# protocol conformance testing)
fdscTransfer.enabled=false

# ---------------------------------------------------------------------------
# DCP Configuration
# ---------------------------------------------------------------------------

# Disable DCP extension for TCK mode (test identity service is used instead)
dcp.enabled=false

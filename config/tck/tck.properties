#
# DSP TCK Configuration Properties
#
# Configuration for the Eclipse Dataspace Protocol Technology Compatibility Kit (DSP TCK).
# These properties configure the TCK runtime to test the fdsc-edc controlplane for
# DSP conformance. Hostnames use Docker Compose service names.
#
# See: https://github.com/eclipse-dataspacetck/dsp-tck
#

# ---------------------------------------------------------------------------
# TCK Runtime Settings
# ---------------------------------------------------------------------------

# Port the TCK runtime listens on for callbacks from the connector
dataspacetck.port=8083

# Address the connector should use to reach the TCK callback server
dataspacetck.callback.address=http://tck:8083

# Default wait time (ms) for the connector to respond to DSP messages
dataspacetck.dsp.default.wait=15000

# ---------------------------------------------------------------------------
# Connector Connection Settings
# ---------------------------------------------------------------------------

# The connector's participant/agent ID
dataspacetck.dsp.connector.agent.id=urn:connector:fdsc-edc

# DSP protocol endpoint URL
dataspacetck.dsp.connector.http.url=http://edc:8282/protocol

# Base URL for the connector's metadata/.well-known endpoint
dataspacetck.dsp.connector.http.base.url=http://edc:8282

# ---------------------------------------------------------------------------
# Consumer-side Webhook Endpoints
#
# These URLs are used by the TCK to instruct the connector (acting as consumer)
# to initiate contract negotiations and transfer processes. They correspond to
# the TckWebhookController endpoints in the test-extension module.
# ---------------------------------------------------------------------------

# Webhook endpoint to initiate consumer contract negotiations
dataspacetck.dsp.connector.negotiation.initiate.url=http://edc:8687/tck/negotiations/requests

# Webhook endpoint to initiate consumer transfer processes
dataspacetck.dsp.connector.transfer.initiate.url=http://edc:8687/tck/transfers/requests

# ---------------------------------------------------------------------------
# Catalog Protocol Tests (CAT)
#
# Dataset IDs for catalog query verification tests.
# These correspond to asset IDs defined in DataAssembly.java.
# ---------------------------------------------------------------------------

CAT_01_01_DATASETID=CAT0101
CAT_01_02_DATASETID=CAT0102


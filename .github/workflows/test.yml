name: Test

on:
  push:

env:
  # Eclipse DSP TCK image version
  DSP_TCK_VERSION: "1.0.0-RC6"

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Check code style and license
        run: mvn clean spotless:check

      - name: Run tests
        run: mvn test

  tck-conformance:
    name: DSP TCK Conformance Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-docker-${{ hashFiles('docker/Dockerfile', '**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-docker-

      - name: Build controlplane shaded JAR
        run: mvn package -pl controlplane-oid4vc -am -DskipTests -q

      - name: Build EDC Docker image with cache
        run: |
          docker buildx build \
            --file docker/Dockerfile \
            --build-arg JAR=controlplane-oid4vc/target/controlplane-oid4vc-0.0.1-SNAPSHOT.jar \
            --tag fdsc-edc-controlplane-oid4vc:latest \
            --cache-from type=local,src=/tmp/.buildx-cache \
            --cache-to type=local,dest=/tmp/.buildx-cache-new,mode=max \
            --load \
            .
          # Rotate cache to avoid unbounded growth
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Start EDC and run TCK tests
        run: |
          docker compose -f docker-compose.tck.yml up \
            --abort-on-container-exit \
            --exit-code-from tck
        env:
          DSP_TCK_VERSION: ${{ env.DSP_TCK_VERSION }}

      - name: Upload EDC container logs on failure
        if: failure()
        run: |
          mkdir -p tck-logs
          docker compose -f docker-compose.tck.yml logs postgis > tck-logs/postgis.log 2>&1 || true
          docker compose -f docker-compose.tck.yml logs scorpio > tck-logs/scorpio.log 2>&1 || true
          docker compose -f docker-compose.tck.yml logs tmforum > tck-logs/tmforum.log 2>&1 || true
          docker compose -f docker-compose.tck.yml logs tmf-init > tck-logs/tmf-init.log 2>&1 || true
          docker compose -f docker-compose.tck.yml logs edc > tck-logs/edc.log 2>&1 || true
          docker compose -f docker-compose.tck.yml logs tck > tck-logs/tck.log 2>&1 || true

      - name: Upload TCK logs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tck-logs
          path: tck-logs/
          retention-days: 14

      - name: Tear down containers
        if: always()
        run: docker compose -f docker-compose.tck.yml down -v
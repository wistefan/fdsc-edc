name: Test

on:
  push:

env:
  # Eclipse DSP TCK image version
  DSP_TCK_VERSION: "1.0.0-RC6"

jobs:
  test:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:

      - uses: actions/checkout@v2

      - uses: actions/setup-java@v1
        with:
          java-version: '21'
          java-package: jdk

      - name: Check code style and license
        run: mvn clean spotless:check

      - name: Run tests
        run: mvn clean test

  tck-conformance:
    name: DSP TCK Conformance Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build controlplane shaded JAR
        run: mvn clean package -pl controlplane-oid4vc -am -DskipTests -q

      - name: Start EDC and run TCK tests
        run: |
          docker compose -f docker-compose.tck.yml up \
            --build \
            --abort-on-container-exit \
            --exit-code-from tck
        env:
          DSP_TCK_VERSION: ${{ env.DSP_TCK_VERSION }}

      - name: Upload EDC container logs on failure
        if: failure()
        run: |
          mkdir -p tck-logs
          docker compose -f docker-compose.tck.yml logs edc > tck-logs/edc.log 2>&1 || true
          docker compose -f docker-compose.tck.yml logs tck > tck-logs/tck.log 2>&1 || true

      - name: Upload TCK logs as artifact
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: tck-logs
          path: tck-logs/
          retention-days: 14

      - name: Tear down containers
        if: always()
        run: docker compose -f docker-compose.tck.yml down -v